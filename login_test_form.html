<!DOCTYPE html>
<html>
<head>
    <title>Login Test for Android</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 500px; }
        input { margin: 5px 0; padding: 8px; width: 200px; }
        button { padding: 10px 20px; background: #007cba; color: white; border: none; }
        .result { margin-top: 20px; padding: 10px; background: #f5f5f5; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Android Login Test</h1>
        <p>Testing login exactly as Android app would call it</p>
        
        <form id="loginForm">
            <div>
                <label>Employee ID:</label><br>
                <input type="text" id="employee_id" value="EMP001">
            </div>
            <div>
                <label>PIN:</label><br>
                <input type="password" id="pin" value="1234">
            </div>
            <div>
                <button type="submit">Test Login</button>
            </div>
        </form>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('employee_id', document.getElementById('employee_id').value);
            formData.append('pin', document.getElementById('pin').value);
            
            document.getElementById('result').textContent = 'Testing...';
            
            fetch('login_api.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('result').textContent = 'Response from login_api.php:\n' + data;
                
                // Try to parse as JSON
                try {
                    const json = JSON.parse(data);
                    document.getElementById('result').textContent += '\n\nParsed JSON:\n' + JSON.stringify(json, null, 2);
                } catch (e) {
                    document.getElementById('result').textContent += '\n\nNote: Response is not valid JSON';
                }
            })
            .catch(error => {
                document.getElementById('result').textContent = 'Error: ' + error;
            });
        });
    </script>
</body>
</html>
