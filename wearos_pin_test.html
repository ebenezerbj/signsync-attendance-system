<!DOCTYPE html>
<html>
<head>
    <title>WearOS API PIN Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { background: #f8f9fa; padding: 15px; margin: 15px 0; border-radius: 8px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🔐 WearOS API PIN Authentication Test</h2>
    
    <div class="test-section">
        <h3>Test WearOS Authentication Endpoint</h3>
        <button onclick="testWearOSAuth('EMP001', '1234')">Test EMP001 + Default PIN</button>
        <button onclick="testWearOSAuth('TEST001', '7890')">Test TEST001 + Phone PIN</button>
        <button onclick="testWearOSPing()">Test WearOS Ping</button>
    </div>
    
    <div id="results"></div>

    <script>
        async function testWearOSAuth(employeeId, pin) {
            const resultDiv = document.getElementById('results');
            
            try {
                const response = await fetch('wearos_api.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'authenticate_employee',
                        employee_id: employeeId,
                        pin: pin
                    })
                });
                
                const result = await response.json();
                
                let resultHTML = `<div class="${result.success ? 'success' : 'error'}">`;
                resultHTML += `<h4>WearOS Auth Test: ${employeeId}</h4>`;
                resultHTML += `<p>Employee: ${employeeId}, PIN: ${pin}</p>`;
                
                if (result.success) {
                    resultHTML += `<p>✅ SUCCESS: ${result.message}</p>`;
                    if (result.data) {
                        resultHTML += `<p>Employee: ${result.data.employee_name || result.data.name}</p>`;
                        resultHTML += `<p>Session Token: ${result.data.session_token || 'Generated'}</p>`;
                    }
                } else {
                    resultHTML += `<p>❌ FAILED: ${result.message}</p>`;
                }
                
                resultHTML += '</div>';
                resultDiv.innerHTML += resultHTML;
                
            } catch (error) {
                const errorHTML = `<div class="error">
                    <h4>WearOS Auth Test Error</h4>
                    <p>❌ ERROR: ${error.message}</p>
                </div>`;
                resultDiv.innerHTML += errorHTML;
            }
        }
        
        async function testWearOSPing() {
            const resultDiv = document.getElementById('results');
            
            try {
                const response = await fetch('wearos_api.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'ping'
                    })
                });
                
                const result = await response.json();
                
                let resultHTML = `<div class="${result.success ? 'success' : 'error'}">`;
                resultHTML += `<h4>WearOS Ping Test</h4>`;
                
                if (result.success) {
                    resultHTML += `<p>✅ SUCCESS: ${result.message}</p>`;
                    if (result.data) {
                        resultHTML += `<p>Server Time: ${result.data.server_time}</p>`;
                        resultHTML += `<p>API Version: ${result.data.api_version}</p>`;
                        resultHTML += `<p>Status: ${result.data.status}</p>`;
                    }
                } else {
                    resultHTML += `<p>❌ FAILED: ${result.message}</p>`;
                }
                
                resultHTML += '</div>';
                resultDiv.innerHTML += resultHTML;
                
            } catch (error) {
                const errorHTML = `<div class="error">
                    <h4>WearOS Ping Test Error</h4>
                    <p>❌ ERROR: ${error.message}</p>
                </div>`;
                resultDiv.innerHTML += errorHTML;
            }
        }
        
        // Auto-run ping test on load
        window.onload = function() {
            testWearOSPing();
        };
    </script>
</body>
</html>
