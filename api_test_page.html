<!DOCTYPE html>
<html>
<head>
    <title>Clock In/Out API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { background: #007bff; color: white; border: none; padding: 12px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; background: #f8f9fa; border: 1px solid #ddd; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Clock In/Out API Test</h2>
        
        <form id="clockForm">
            <div class="form-group">
                <label>Action:</label>
                <select id="action" name="action">
                    <option value="clock_in">Clock In</option>
                    <option value="clock_out">Clock Out</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Employee ID:</label>
                <input type="number" id="employee_id" name="employee_id" value="1" required>
            </div>
            
            <div class="form-group">
                <label>Latitude:</label>
                <input type="number" id="latitude" name="latitude" value="5.6037" step="any" required>
            </div>
            
            <div class="form-group">
                <label>Longitude:</label>
                <input type="number" id="longitude" name="longitude" value="-0.1870" step="any" required>
            </div>
            
            <div class="form-group">
                <label>Address:</label>
                <input type="text" id="address" name="address" value="Test Location" required>
            </div>
            
            <div class="form-group">
                <label>GPS Accuracy (meters):</label>
                <input type="number" id="accuracy" name="accuracy" value="10.0" step="any">
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="test_mode" name="test_mode" checked> Test Mode (Bypass Location Verification)
                </label>
            </div>
            
            <button type="submit">Submit</button>
        </form>
        
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('clockForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                action: formData.get('action'),
                employee_id: parseInt(formData.get('employee_id')),
                latitude: parseFloat(formData.get('latitude')),
                longitude: parseFloat(formData.get('longitude')),
                address: formData.get('address'),
                accuracy: parseFloat(formData.get('accuracy')) || 10.0,
                test_mode: formData.get('test_mode') === 'on'
            };
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Processing...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/enhanced_clockinout_api.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                resultDiv.innerHTML = '<h3>Response:</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>';
                resultDiv.className = 'result ' + (result.success ? 'success' : 'error');
                
            } catch (error) {
                resultDiv.innerHTML = '<h3>Error:</h3><p>' + error.message + '</p>';
                resultDiv.className = 'result error';
            }
        });
        
        // Get current location if available
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                document.getElementById('latitude').value = position.coords.latitude;
                document.getElementById('longitude').value = position.coords.longitude;
                document.getElementById('accuracy').value = position.coords.accuracy;
            });
        }
    </script>
</body>
</html>
