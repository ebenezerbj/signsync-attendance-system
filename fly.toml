# fly.toml app configuration file generated for signsync-attendance on 2026-03-15T00:08:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'signsync-attendance'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '15s'
    timeout = '5s'
    path = '/'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
