<!DOCTYPE html>
<html>
<head>
    <title>SIGNSYNC PIN API Test - Simple Version</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>SIGNSYNC PIN API Test - Simple Version</h1>
    
    <div class="info">
        <strong>Testing PIN validation without logging.</strong><br>
        This tests the core PIN validation logic for your SIGNSYNC system.
    </div>
    
    <p>Available Test Cases:</p>
    <button onclick="testPin('AKCBSTF0005', '1602', 'STEPHEN SARFO - Phone PIN')">Test STEPHEN SARFO - Phone PIN (1602)</button><br>
    <button onclick="testPin('AKCBSTF0005', '1234', 'STEPHEN SARFO - Default PIN')">Test STEPHEN SARFO - Default PIN (1234)</button><br>
    <button onclick="testPin('AKCBSTF0005', '0005', 'STEPHEN SARFO - ID PIN')">Test STEPHEN SARFO - ID PIN (0005)</button><br>
    <button onclick="testPin('EMP001', '7890', 'John Doe - Phone PIN')">Test John Doe - Phone PIN (7890)</button><br>
    <button onclick="testPin('EMP001', '1234', 'John Doe - Default PIN')">Test John Doe - Default PIN (1234)</button><br>
    <button onclick="testPin('EMP001', '0001', 'John Doe - ID PIN')">Test John Doe - ID PIN (0001)</button><br>
    <button onclick="testPin('INVALID', '1234', 'Invalid Employee Test')">Test Invalid Employee</button><br>
    <button onclick="testPin('AKCBSTF0005', '9999', 'Wrong PIN Test')">Test Wrong PIN</button><br>
    
    <button onclick="clearResults()" style="background-color: #6c757d; color: white;">Clear Results</button>
    
    <div id="results"></div>
    
    <script>
        async function testPin(employeeId, pin, description) {
            const resultsDiv = document.getElementById('results');
            
            // Add loading indicator
            resultsDiv.innerHTML += `
                <div class="result" style="background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7;">
                    <strong>⏳ Testing: ${description}</strong><br>
                    Loading...
                </div>
            `;
            
            try {
                const response = await fetch('/signsync_pin_api_simple.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        employee_id: employeeId,
                        pin: pin
                    })
                });
                
                // Remove loading indicator
                const lastResult = resultsDiv.lastElementChild;
                resultsDiv.removeChild(lastResult);
                
                const result = await response.json();
                
                if (result.success) {
                    resultsDiv.innerHTML += `
                        <div class="result success">
                            <strong>✅ ${description}</strong><br>
                            Message: ${result.message}<br>
                            Employee: ${result.data.name}<br>
                            Department: ${result.data.department || 'N/A'}<br>
                            Branch: ${result.data.branch || 'N/A'}<br>
                            PIN Source: ${result.data.pin_source}
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML += `
                        <div class="result error">
                            <strong>❌ ${description}</strong><br>
                            Error: ${result.message}
                        </div>
                    `;
                }
            } catch (error) {
                // Remove loading indicator if still there
                const lastResult = resultsDiv.lastElementChild;
                if (lastResult && lastResult.textContent.includes('Loading...')) {
                    resultsDiv.removeChild(lastResult);
                }
                
                resultsDiv.innerHTML += `
                    <div class="result error">
                        <strong>❌ ${description}</strong><br>
                        Network Error: ${error.message}
                    </div>
                `;
            }
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
    </script>
</body>
</html>
